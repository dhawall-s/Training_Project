<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Teachers - College ERP</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo"><i class="fas fa-graduation-cap"></i> College <span>ERP</span></div>
        <div class="nav-links">
            <a href="#" class="btn-logout" onclick="logout()"><i class="fas fa-right-from-bracket"></i> Logout</a>
        </div>
    </nav>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header"><h3 id="userName">Admin</h3><p id="userRole">Admin Panel</p></div>
            <a href="dashboard.html" class="menu-item"><span class="icon"><i class="fas fa-chart-pie"></i></span> <span>Dashboard</span></a>
            <a href="manage-students.html" class="menu-item"><span class="icon"><i class="fas fa-users"></i></span> <span>Manage Students</span></a>
            <a href="manage-teachers.html" class="menu-item active"><span class="icon"><i class="fas fa-chalkboard-user"></i></span> <span>Manage Teachers</span></a>
            <a href="manage-subjects.html" class="menu-item"><span class="icon"><i class="fas fa-book"></i></span> <span>Manage Subjects</span></a>
            <a href="manage-departments.html" class="menu-item"><span class="icon"><i class="fas fa-building"></i></span> <span>Departments</span></a>
            <a href="create-timetable.html" class="menu-item"><span class="icon"><i class="fas fa-calendar-days"></i></span> <span>Timetable</span></a>
            <a href="notifications.html" class="menu-item"><span class="icon"><i class="fas fa-bell"></i></span> <span>Notifications</span></a>
            <a href="analytics.html" class="menu-item"><span class="icon"><i class="fas fa-chart-simple"></i></span> <span>Analytics</span></a>
        </aside>
        <main class="main-content">
            <div class="page-header">
                <h1><i class="fas fa-chalkboard-user"></i> Manage Teachers</h1>
                <p>Add, edit, and delete teacher records</p>
            </div>
            <div id="alertBox" class="alert"></div>
            <div class="card">
                <div class="card-header">
                    <h2>All Teachers</h2>
                    <button class="btn btn-primary" onclick="openModal('addTeacherModal')"><i class="fas fa-plus"></i> Add Teacher</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Employee ID</th>
                                <th>Department</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="teachersTable">
                            <tr>
                                <td colspan="5">
                                    <div class="loading"><div class="spinner"></div><p>Loading...</p></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="addTeacherModal">
        <div class="modal">
            <div class="modal-header">
                <h2><i class="fas fa-plus"></i> Add New Teacher</h2>
                <button class="modal-close" onclick="closeModal('addTeacherModal')">&times;</button>
            </div>
            <div class="form-group"><label>Name</label><input type="text" id="teacherName" required></div>
            <div class="form-group"><label>Email</label><input type="email" id="teacherEmail" required></div>
            <div class="form-group"><label>Password</label><input type="text" id="teacherPassword" placeholder="Default: 123456" value="123456"></div>
            <div class="form-group"><label>Employee ID</label><input type="text" id="teacherEmpId" required></div>
            <div class="form-group"><label>Department</label><input type="text" id="teacherDept" required></div>
            <div class="form-group"><label>Phone</label><input type="text" id="teacherPhone"></div>
            <div class="form-group"><label>Qualification</label><input type="text" id="teacherQual" placeholder="e.g., M.Tech, PhD"></div>
            <button class="btn btn-primary btn-block" onclick="addTeacher()"><i class="fas fa-floppy-disk"></i> Save Teacher</button>
        </div>
    </div>

    <div class="modal-overlay" id="editTeacherModal">
        <div class="modal">
            <div class="modal-header">
                <h2><i class="fas fa-pen-to-square"></i> Edit Teacher</h2>
                <button class="modal-close" onclick="closeModal('editTeacherModal')">&times;</button>
            </div>
            <input type="hidden" id="editTeacherId">
            <div class="form-group"><label>Name</label><input type="text" id="editTeacherName"></div>
            <div class="form-group"><label>Email</label><input type="email" id="editTeacherEmail"></div>
            <div class="form-group"><label>Employee ID</label><input type="text" id="editTeacherEmpId"></div>
            <div class="form-group"><label>Department</label><input type="text" id="editTeacherDept"></div>
            <button class="btn btn-primary btn-block" onclick="updateTeacher()"><i class="fas fa-floppy-disk"></i> Update Teacher</button>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/admin.js"></script>
    <script>checkAuth('admin'); setUserInfo(); loadAllTeachers();</script>
</body>
</html>
