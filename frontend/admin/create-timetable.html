<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Timetable - College ERP</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo"><i class="fas fa-graduation-cap"></i> College <span>ERP</span></div>
        <div class="nav-links">
            <a href="#" class="btn-logout" onclick="logout()"><i class="fas fa-right-from-bracket"></i> Logout</a>
        </div>
    </nav>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header"><h3 id="userName">Admin</h3><p id="userRole">Admin Panel</p></div>
            <a href="dashboard.html" class="menu-item"><span class="icon"><i class="fas fa-chart-pie"></i></span> <span>Dashboard</span></a>
            <a href="manage-students.html" class="menu-item"><span class="icon"><i class="fas fa-users"></i></span> <span>Manage Students</span></a>
            <a href="manage-teachers.html" class="menu-item"><span class="icon"><i class="fas fa-chalkboard-user"></i></span> <span>Manage Teachers</span></a>
            <a href="manage-subjects.html" class="menu-item"><span class="icon"><i class="fas fa-book"></i></span> <span>Manage Subjects</span></a>
            <a href="manage-departments.html" class="menu-item"><span class="icon"><i class="fas fa-building"></i></span> <span>Departments</span></a>
            <a href="create-timetable.html" class="menu-item active"><span class="icon"><i class="fas fa-calendar-days"></i></span> <span>Timetable</span></a>
            <a href="notifications.html" class="menu-item"><span class="icon"><i class="fas fa-bell"></i></span> <span>Notifications</span></a>
            <a href="analytics.html" class="menu-item"><span class="icon"><i class="fas fa-chart-simple"></i></span> <span>Analytics</span></a>
        </aside>
        <main class="main-content">
            <div class="page-header">
                <h1><i class="fas fa-calendar-days"></i> Timetable Management</h1>
                <p>Create and manage class schedules</p>
            </div>
            <div id="alertBox" class="alert"></div>

            <!-- Filter -->
            <div class="card">
                <div style="display:flex; gap:16px; align-items:flex-end;">
                    <div class="form-group" style="flex:1;">
                        <label><i class="fas fa-building"></i> Department</label>
                        <input type="text" id="ttDepartment" placeholder="e.g., Computer Science">
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label><i class="fas fa-list-ol"></i> Semester</label>
                        <input type="number" id="ttSemester" placeholder="e.g., 3" min="1" max="8">
                    </div>
                    <button class="btn btn-primary" onclick="loadTimetable()" style="height:40px;"><i class="fas fa-magnifying-glass"></i> Search</button>
                    <button class="btn btn-success" onclick="openModal('addTimetableModal')" style="height:40px;"><i class="fas fa-plus"></i> Add Entry</button>
                </div>
            </div>

            <div class="card">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Department</th>
                                <th>Semester</th>
                                <th>Day</th>
                                <th>Periods</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="timetableTable">
                            <tr>
                                <td colspan="5">
                                    <div class="loading"><div class="spinner"></div><p>Loading...</p></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- ADD TIMETABLE ENTRY MODAL -->
    <div class="modal-overlay" id="addTimetableModal">
        <div class="modal">
            <div class="modal-header">
                <h2><i class="fas fa-plus"></i> Add Timetable Entry</h2>
                <button class="modal-close" onclick="closeModal('addTimetableModal')">&times;</button>
            </div>
            <div class="form-group"><label>Department</label><input type="text" id="newTtDept" placeholder="Computer Science" required></div>
            <div class="form-group"><label>Semester</label><input type="number" id="newTtSem" min="1" max="8" value="1"></div>
            <div class="form-group">
                <label>Day</label>
                <select id="newTtDay">
                    <option value="Monday">Monday</option>
                    <option value="Tuesday">Tuesday</option>
                    <option value="Wednesday">Wednesday</option>
                    <option value="Thursday">Thursday</option>
                    <option value="Friday">Friday</option>
                    <option value="Saturday">Saturday</option>
                </select>
            </div>
            <div class="form-group">
                <label>Periods</label>
                <div id="periodsContainer">
                    <div class="period-row" style="display:flex; gap:8px; margin-bottom:8px;">
                        <input type="text" class="period-time" placeholder="Time (9:00-10:00)" style="flex:1; padding:8px; border:1px solid #d1d5db; border-radius:6px;">
                        <input type="text" class="period-subject" placeholder="Subject" style="flex:1; padding:8px; border:1px solid #d1d5db; border-radius:6px;">
                        <input type="text" class="period-teacher" placeholder="Teacher" style="flex:1; padding:8px; border:1px solid #d1d5db; border-radius:6px;">
                    </div>
                </div>
                <button type="button" class="btn btn-sm btn-success" onclick="addPeriodRow()"><i class="fas fa-plus"></i> Add Period</button>
            </div>
            <button class="btn btn-primary btn-block" onclick="createTimetable()" style="margin-top:12px;"><i class="fas fa-floppy-disk"></i> Save Timetable</button>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/admin.js"></script>
    <script>checkAuth('admin'); setUserInfo(); loadTimetable();</script>
</body>
</html>
