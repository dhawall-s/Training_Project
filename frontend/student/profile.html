<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>My Profile - College ERP</title><link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></head>
<body>
    <nav class="navbar"><div class="logo"><i class="fas fa-graduation-cap"></i> College <span>ERP</span></div><div class="nav-links"><a href="dashboard.html"><i class="fas fa-chart-pie"></i> Dashboard</a><a href="#" class="btn-logout" onclick="logout()"><i class="fas fa-right-from-bracket"></i> Logout</a></div></nav>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header"><h3 id="userName">Student</h3><p id="userRole">Student Panel</p></div>
            <a href="dashboard.html" class="menu-item"><span class="icon"><i class="fas fa-chart-pie"></i></span> <span>Dashboard</span></a>
            <a href="attendance.html" class="menu-item"><span class="icon"><i class="fas fa-clipboard-check"></i></span> <span>Attendance</span></a>
            <a href="assignments.html" class="menu-item"><span class="icon"><i class="fas fa-file-pen"></i></span> <span>Assignments</span></a>
            <a href="notes.html" class="menu-item"><span class="icon"><i class="fas fa-book"></i></span> <span>Notes</span></a>
            <a href="results.html" class="menu-item"><span class="icon"><i class="fas fa-chart-line"></i></span> <span>Results</span></a>
            <a href="timetable.html" class="menu-item"><span class="icon"><i class="fas fa-calendar-days"></i></span> <span>Timetable</span></a>
            <a href="profile.html" class="menu-item active"><span class="icon"><i class="fas fa-user"></i></span> <span>Profile</span></a>
        </aside>
        <main class="main-content">
            <div class="page-header"><h1><i class="fas fa-user"></i> My Profile</h1><p>View your profile information</p></div>
            <div id="alertBox" class="alert"></div>
            <div class="card">
                <div class="profile-card">
                    <div class="profile-avatar" id="profileAvatar">S</div>
                    <div class="profile-info">
                        <h2 id="profileName">Loading...</h2>
                        <span class="role-badge" id="profileRole">Student</span>
                        <div class="profile-details">
                            <div class="detail-item"><div class="detail-label">Email</div><div class="detail-value" id="profileEmail">-</div></div>
                            <div class="detail-item"><div class="detail-label">Roll No</div><div class="detail-value" id="profileRollNo">-</div></div>
                            <div class="detail-item"><div class="detail-label">Department</div><div class="detail-value" id="profileDepartment">-</div></div>
                            <div class="detail-item"><div class="detail-label">Semester</div><div class="detail-value" id="profileSemester">-</div></div>
                            <div class="detail-item"><div class="detail-label">Phone</div><div class="detail-value" id="profilePhone">-</div></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card" style="margin-top: 20px;">
                <div class="card-header"><h2><i class="fas fa-lock"></i> Change Password</h2></div>
                <form id="changePasswordForm" onsubmit="changePasswordSubmit(event)">
                    <div class="form-group"><label>Old Password</label><input type="password" id="oldPassword" required></div>
                    <div class="form-group"><label>New Password</label><input type="password" id="newPassword" required minlength="6"></div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-rotate"></i> Change Password</button>
                </form>
            </div>
        </main>
    </div>
    <script src="../js/auth.js"></script><script src="../js/student.js"></script>
    <script>
        checkAuth('student'); setUserInfo(); loadProfile();
        async function changePasswordSubmit(e) {
            e.preventDefault();
            const result = await apiCall('/auth/change-password', 'PUT', { oldPassword: document.getElementById('oldPassword').value, newPassword: document.getElementById('newPassword').value });
            if (result && result.ok) { showAlert(result.data.message, 'success'); document.getElementById('changePasswordForm').reset(); } else { showAlert(result.data.message, 'error'); }
        }
    </script>
</body>
</html>
