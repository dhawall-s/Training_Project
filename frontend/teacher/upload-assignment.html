<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Upload Assignment - College ERP</title><link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></head>
<body>
    <nav class="navbar"><div class="logo"><i class="fas fa-graduation-cap"></i> College <span>ERP</span></div><div class="nav-links"><a href="profile.html"><i class="fas fa-user"></i> Profile</a><a href="#" class="btn-logout" onclick="logout()"><i class="fas fa-right-from-bracket"></i> Logout</a></div></nav>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header"><h3 id="userName">Teacher</h3><p id="userRole">Teacher Panel</p></div>
            <a href="dashboard.html" class="menu-item"><span class="icon"><i class="fas fa-chart-pie"></i></span> <span>Dashboard</span></a>
            <a href="mark-attendance.html" class="menu-item"><span class="icon"><i class="fas fa-clipboard-check"></i></span> <span>Mark Attendance</span></a>
            <a href="upload-notes.html" class="menu-item"><span class="icon"><i class="fas fa-book"></i></span> <span>Upload Notes</span></a>
            <a href="upload-assignment.html" class="menu-item active"><span class="icon"><i class="fas fa-file-pen"></i></span> <span>Upload Assignment</span></a>
            <a href="enter-marks.html" class="menu-item"><span class="icon"><i class="fas fa-chart-line"></i></span> <span>Enter Marks</span></a>
            <a href="student-list.html" class="menu-item"><span class="icon"><i class="fas fa-users"></i></span> <span>Student List</span></a>
            <a href="timetable.html" class="menu-item"><span class="icon"><i class="fas fa-calendar-days"></i></span> <span>Timetable</span></a>
            <a href="profile.html" class="menu-item"><span class="icon"><i class="fas fa-user"></i></span> <span>Profile</span></a>
        </aside>
        <main class="main-content">
            <div class="page-header"><h1><i class="fas fa-file-pen"></i> Upload Assignment</h1><p>Create and upload assignments for students</p></div>
            <div id="alertBox" class="alert"></div>
            <div class="card">
                <form id="assignForm" onsubmit="event.preventDefault(); uploadAssignment();">
                    <div class="form-group"><label><i class="fas fa-thumbtack"></i> Assignment Title</label><input type="text" id="assignTitle" placeholder="e.g., DSA Assignment 1" required></div>
                    <div class="form-group"><label><i class="fas fa-book-open"></i> Subject</label><select id="assignSubject" class="subject-dropdown" required></select></div>
                    <div class="form-group"><label><i class="fas fa-pen"></i> Description</label><textarea id="assignDesc" placeholder="Instructions for the assignment..."></textarea></div>
                    <div class="form-group"><label><i class="fas fa-calendar-days"></i> Due Date</label><input type="date" id="assignDueDate" required></div>
                    <div class="form-group"><label><i class="fas fa-file-pdf"></i> Upload PDF (Optional)</label><input type="file" id="assignFile" accept=".pdf"></div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-upload"></i> Upload Assignment</button>
                </form>
            </div>
        </main>
    </div>
    <script src="../js/auth.js"></script><script src="../js/teacher.js"></script><script>checkAuth('teacher'); setUserInfo(); loadTeacherSubjects();</script>
</body>
</html>
