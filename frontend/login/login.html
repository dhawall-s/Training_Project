<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - College ERP</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-icon"><i class="fas fa-graduation-cap" style="font-size:48px; color:#2563eb;"></i></div>
                <h1>Welcome Back</h1>
                <p>Login to your College ERP account</p>
            </div>

            <div id="alertBox" class="alert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-right-to-bracket"></i> Login</button>
            </form>

            <div class="auth-links">
                <p><a href="forgot-password.html"><i class="fas fa-key"></i> Forgot Password?</a></p>
                <p style="margin-top: 8px;"><a href="../index.html"><i class="fas fa-arrow-left"></i> Back to Home</a></p>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script>
        // ============================================
        // LOGIN FORM HANDLER
        // ============================================
        // WHY: No role selection needed - system auto-detects role from database
        // User just enters email and password
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // Send login request - no role needed
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Save token and user data
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    showAlert('Login successful! Redirecting...', 'success');

                    // Auto-redirect based on role from database
                    // WHY: The backend returns the user's role automatically
                    // No need for user to select their role
                    setTimeout(() => {
                        if (data.user.role === 'student') {
                            window.location.href = '../student/dashboard.html';
                        } else if (data.user.role === 'teacher') {
                            window.location.href = '../teacher/dashboard.html';
                        } else if (data.user.role === 'admin') {
                            window.location.href = '../admin/dashboard.html';
                        }
                    }, 1000);

                } else {
                    showAlert(data.message, 'error');
                }

            } catch (error) {
                showAlert('Cannot connect to server. Make sure backend is running!', 'error');
            }
        });
    </script>
</body>
</html>
